<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- V3: C Monogram — letra C que simula una columna curvada (sutil y elegante) -->
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#005c55"/>
    </linearGradient>
  </defs>

  <!-- C monogram with vertebra-like notches -->
  <g transform="translate(8 8)">
    <!-- Main C shape -->
    <path d="M 60 4
             A 32 32 0 1 0 60 60
             L 56 52
             A 24 24 0 1 1 56 12
             Z"
          fill="url(#g3)"/>

    <!-- Three small notches inside the C suggesting vertebrae -->
    <circle cx="20" cy="22" r="2.5" fill="#ffffff" opacity="0.85"/>
    <circle cx="14" cy="32" r="2.5" fill="#ffffff" opacity="0.85"/>
    <circle cx="20" cy="42" r="2.5" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(86 0)">
    <text x="0" y="44" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="600" font-size="30" fill="#131b2e" letter-spacing="-0.6">chiropract</text>
    <text x="173" y="44" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="600" font-size="30" fill="#005c55" letter-spacing="-0.6">.co</text>
    <text x="0" y="62" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="400" font-style="italic" font-size="11" fill="#3e4947">precision spine care, scaled.</text>
  </g>
</svg>
