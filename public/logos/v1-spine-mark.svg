<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- V1: Spine Mark Classic — símbolo de columna + wordmark -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#005c55"/>
    </linearGradient>
  </defs>

  <!-- Spine icon (7 vertebrae stacked) -->
  <g transform="translate(8 8)">
    <!-- Frame around the spine -->
    <rect x="0" y="0" width="56" height="64" rx="6" fill="none" stroke="#005c55" stroke-width="2.5"/>

    <!-- Vertebrae: tear-drop shapes alternating L/R -->
    <path d="M 28 10 Q 38 12 36 18 Q 34 22 28 22 Q 22 22 20 18 Q 18 12 28 10 Z" fill="url(#g1)"/>
    <path d="M 28 22 Q 18 24 20 30 Q 22 34 28 34 Q 34 34 36 30 Q 38 24 28 22 Z" fill="url(#g1)"/>
    <path d="M 28 34 Q 38 36 36 42 Q 34 46 28 46 Q 22 46 20 42 Q 18 36 28 34 Z" fill="url(#g1)"/>
    <path d="M 28 46 Q 18 48 20 54 Q 22 58 28 58 Q 34 58 36 54 Q 38 48 28 46 Z" fill="url(#g1)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(80 0)">
    <text x="0" y="50" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="700" font-size="32" fill="#131b2e" letter-spacing="-1">chiropract</text>
    <text x="186" y="50" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="500" font-size="32" fill="#005c55" letter-spacing="-1">.co</text>
  </g>
</svg>
